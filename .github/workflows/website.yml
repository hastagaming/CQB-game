name: Build Website

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ... (langkah-langkah build kamu yang lain ada di sini) ...

      - name: Notifikasi Telegram - BERHASIL 🚀
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ✅ **Build Berhasil, Nasa!**
            Website **Bakso Bangi** sudah aman.

      - name: Notifikasi Telegram - GAGAL ❌
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ⚠️ **Waduh Nasa, Build GAGAL!**
            Cek errornya di sini: https://github.com/${{ github.repository }}/actions
