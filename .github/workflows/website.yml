name: CI/CD Bakso Bangi

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      # --- BAGIAN NOTIFIKASI TELEGRAM ---

      - name: Notifikasi Telegram - BERHASIL 🚀
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ✅ **Build Berhasil, Nasa!**
            
            Website **Bakso Bangi** di repo `${{ github.repository }}` sudah berhasil diperbarui tanpa kendala.
            
            🔗 [Lihat Website](https://hastagaming.github.io/CQB-game/)
            👤 **Pushed by:** ${{ github.actor }}

      - name: Notifikasi Telegram - GAGAL ❌
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ⚠️ **Waduh Nasa, Build GAGAL!**
            
            Ada masalah saat proses deploy website **Bakso Bangi**.
            ❌ **Status:** Failed
            🛠 **Cek Error di Sini:** https://github.com/${{ github.repository }}/actions
            
            Segera diperiksa ya, semangat!
