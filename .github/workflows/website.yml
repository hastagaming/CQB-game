name: CI/CD Bakso Bangi

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Wajib ditambahkan agar GitHub Actions diizinkan mengunggah file ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- BAGIAN DEPLOY KE GITHUB PAGES ---
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Pastikan index.html ada di folder utama

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # --- BAGIAN NOTIFIKASI TELEGRAM ---
      - name: Notifikasi Telegram - BERHASIL 🚀
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ✅ **Build Berhasil, Nasa!**
            
            Website **Bakso Bangi** di repo `${{ github.repository }}` sudah berhasil diperbarui tanpa kendala.
            
            🔗 [Lihat Website](https://hastagaming.github.io/CQB-game/)
            👤 **Pushed by:** ${{ github.actor }}

      - name: Notifikasi Telegram - GAGAL ❌
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ⚠️ **Waduh Nasa, Build GAGAL!**
            
            Ada masalah saat proses deploy website **Bakso Bangi**.
            ❌ **Status:** Failed
            🛠 **Cek Error di Sini:** https://github.com/${{ github.repository }}/actions
            
            Segera diperiksa ya, semangat!
